<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>MoonLight (Catalogo)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- TailwindCSS CDN para estilos rápidos -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Lato', sans-serif;
    }

    /* Mobile Optimization: Scale down base size */
    @media (max-width: 640px) {
      html {
        font-size: 14px;
      }
    }

    h1,
    h2,
    h3,
    .font-serif {
      font-family: 'Playfair Display', serif;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #c7c7c7;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 text-gray-800 min-h-screen flex flex-col">

  <!-- Encabezado Sticky con efecto Glassmorphism (iOS 26 Style) -->
  <header
    class="sticky top-0 z-50 bg-white/85 backdrop-filter backdrop-blur-md border-b border-gray-200/50 shadow-sm transition-all duration-300">
    <div class="max-w-6xl mx-auto px-4 py-2 flex flex-col items-center justify-center">
      <img src="images/logo.png" alt="Logo MoonLight"
        class="h-48 w-auto transform hover:scale-105 transition-transform duration-500" />
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="flex-1 max-w-6xl mx-auto px-2 sm:px-4 py-4 sm:py-8 w-full">

    <!-- Filtros -->
    <section
      class="bg-white/60 backdrop-blur-sm rounded-2xl shadow-sm border border-white/50 p-4 sm:p-6 mb-6 sm:mb-8 grid gap-4 sm:gap-6 grid-cols-2 md:grid-cols-4">
      <!-- Categoría -->
      <div class="col-span-1">
        <label for="categoryFilter"
          class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Categoría</label>
        <select id="categoryFilter"
          class="block w-full bg-white border-gray-200 rounded-full shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm py-2 px-4 transition-shadow hover:shadow-md">
          <option value="todas">Todas</option>
        </select>
      </div>

      <!-- Subcategoría -->
      <div class="col-span-1">
        <label for="subcategoryFilter"
          class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Subcategoría</label>
        <select id="subcategoryFilter"
          class="block w-full bg-white border-gray-200 rounded-full shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm py-2 px-4 transition-shadow hover:shadow-md">
          <option value="todas">Todas</option>
        </select>
      </div>

      <!-- Género -->
      <div class="col-span-1">
        <label for="genderFilter"
          class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Género</label>
        <select id="genderFilter"
          class="block w-full bg-white border-gray-200 rounded-full shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm py-2 px-4 transition-shadow hover:shadow-md">
          <option value="todos">Todos</option>
          <option value="hombre">Hombre</option>
          <option value="mujer">Mujer</option>
          <option value="unisex">Unisex</option>
        </select>
      </div>

      <!-- Buscador -->
      <div class="col-span-1">
        <label for="searchInput"
          class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Buscar</label>
        <input type="text" id="searchInput" placeholder="Buscar..."
          class="block w-full bg-white border-gray-200 rounded-full shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm py-2 px-4 transition-shadow hover:shadow-md" />
      </div>
    </section>

    <!-- Resumen -->
    <div class="flex items-center justify-between mb-4 sm:mb-6 px-2">
      <h2 class="text-xl sm:text-2xl font-serif font-bold text-gray-900">Colección</h2>
      <span id="productCount"
        class="text-xs sm:text-sm font-medium text-gray-500 bg-white px-3 py-1 rounded-full shadow-sm"></span>
    </div>

    <!-- Grid de productos -->
    <section id="productGrid" class="grid gap-4 grid-cols-2 sm:gap-8 sm:grid-cols-2 lg:grid-cols-3">
      <!-- Aquí se inyectan las tarjetas por JavaScript -->
    </section>
  </main>

  <!-- Pie de página -->
  <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-6xl mx-auto px-4 py-6 text-xs text-gray-400 flex justify-between items-center">
      <span>&copy; 2025 MoonLight Boutique</span>
      <span>Diseño Premium</span>
    </div>
  </footer>

  <!-- Modal de Producto -->
  <div id="productModal"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity duration-300"
    onclick="closeModal(event)">
    <div
      class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full overflow-hidden relative flex flex-col md:flex-row max-h-[90vh]"
      onclick="event.stopPropagation()">

      <button
        class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 z-10 bg-white/80 rounded-full p-2 transition-colors"
        onclick="closeModal()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Imagen Modal -->
      <div class="w-full md:w-1/2 bg-gray-100 h-64 md:h-auto relative">
        <img id="modalImage" src="" alt="" class="w-full h-full object-cover" />
      </div>

      <!-- Contenido Modal -->
      <div class="w-full md:w-1/2 p-6 sm:p-8 flex flex-col overflow-y-auto">
        <div class="mb-1">
          <p id="modalCategory" class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-2"></p>
          <h3 id="modalTitle" class="text-2xl sm:text-3xl font-serif font-bold text-gray-900 mb-4 leading-tight"></h3>
        </div>

        <div class="prose prose-sm text-gray-600 mb-8 flex-1">
          <p id="modalDescription" class="leading-relaxed"></p>
        </div>

        <div class="mt-auto pt-6 border-t border-gray-100 flex items-center justify-between">
          <div class="flex flex-col">
            <span class="text-xs text-gray-500 uppercase">Precio</span>
            <span id="modalPrice" class="text-2xl sm:text-3xl font-serif font-bold text-gray-900"></span>
          </div>

          <button id="modalWhatsappBtn"
            class="bg-gray-900 hover:bg-gray-800 text-white font-bold py-3 px-6 sm:px-8 rounded-full shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5 flex items-center gap-2 text-sm sm:text-base">
            <span>Disponibilidad</span>
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Lógica de la página -->
  <script src="products.js"></script>
  <script src="script.js"></script>
</body>

</html>
